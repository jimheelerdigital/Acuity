<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Full Matrix badge, earned">
  <defs>
    <radialGradient id="full_matrix_earned_tiered_body" cx="36%" cy="26%" r="84%">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="52%" stop-color="#D6DEEA"></stop>
      <stop offset="100%" stop-color="#7E899C"></stop>
    </radialGradient>
    <radialGradient id="full_matrix_earned_tiered_face" cx="42%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#F4F8FE"></stop>
      <stop offset="58%" stop-color="#D2DCEA"></stop>
      <stop offset="100%" stop-color="#94A0B4"></stop>
    </radialGradient>
    <linearGradient id="full_matrix_earned_tiered_rim" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="48%" stop-color="#6A7488"></stop>
      <stop offset="72%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#6A7488"></stop>
    </linearGradient>
    <linearGradient id="full_matrix_earned_tiered_rib" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A6B2C4"></stop>
      <stop offset="100%" stop-color="#7E899C"></stop>
    </linearGradient>
    <linearGradient id="full_matrix_earned_tiered_shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"></stop>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="full_matrix_earned_tiered_raise" x="-40%" y="-40%" width="180%" height="180%">
      <feOffset in="SourceAlpha" dx="0" dy="-1.1" result="up"></feOffset>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.9"></feFlood>
      <feComposite in2="up" operator="in" result="hl"></feComposite>
      <feOffset in="SourceAlpha" dx="0" dy="1.6" result="dn"></feOffset>
      <feFlood flood-color="#000000" flood-opacity="0.5"></feFlood>
      <feComposite in2="dn" operator="in" result="sh"></feComposite>
      <feMerge><feMergeNode in="sh"></feMergeNode><feMergeNode in="hl"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="full_matrix_earned_tiered_ds" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#05060C" flood-opacity="0.42"></feDropShadow>
    </filter>
    <filter id="full_matrix_earned_tiered_ds2" x="-30%" y="-30%" width="160%" height="200%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>

  <g opacity="1" filter="url(#full_matrix_earned_tiered_ds)">
    <g>
      
      <rect x="7" y="7" width="186" height="186" rx="52" fill="#69748A"></rect>
      <rect x="10" y="10" width="180" height="180" rx="50" fill="url(#full_matrix_earned_tiered_body)"></rect>
      <rect x="22" y="22" width="156" height="156" rx="42" fill="none" stroke="url(#full_matrix_earned_tiered_rim)" stroke-width="3.5"></rect>
      <rect x="25" y="25" width="150" height="150" rx="40" fill="#7E899C"></rect>
      <rect x="28" y="28" width="144" height="144" rx="38" fill="url(#full_matrix_earned_tiered_face)"></rect>
      <g fill="url(#full_matrix_earned_tiered_shine)" opacity="0.5"><rect x="28" y="28" width="144" height="144" rx="38"></rect></g>
      <g filter="url(#full_matrix_earned_tiered_raise)"><circle cx="100.0" cy="66.0" r="5" fill="#34506B"></circle><circle cx="115.0" cy="70.0" r="5" fill="#46607A"></circle><circle cx="126.0" cy="81.0" r="5" fill="#34506B"></circle><circle cx="130.0" cy="96.0" r="5" fill="#46607A"></circle><circle cx="126.0" cy="111.0" r="5" fill="#34506B"></circle><circle cx="115.0" cy="122.0" r="5" fill="#46607A"></circle><circle cx="100.0" cy="126.0" r="5" fill="#34506B"></circle><circle cx="85.0" cy="122.0" r="5" fill="#46607A"></circle><circle cx="74.0" cy="111.0" r="5" fill="#34506B"></circle><circle cx="70.0" cy="96.0" r="5" fill="#46607A"></circle><circle cx="74.0" cy="81.0" r="5" fill="#34506B"></circle><circle cx="85.0" cy="70.0" r="5" fill="#46607A"></circle><circle cx="100" cy="96" r="8" fill="#34506B"></circle></g>
      
      <g opacity="0.9">
        <text x="100" y="150.7" text-anchor="middle" dominant-baseline="central" font-family="&#39;Geist Mono&#39;, monospace" font-weight="600" font-size="7" letter-spacing="2.6" fill="#FFFFFF" opacity="0.22">PLATINUM</text>
        <text x="100" y="150" text-anchor="middle" dominant-baseline="central" font-family="&#39;Geist Mono&#39;, monospace" font-weight="600" font-size="7" letter-spacing="2.6" fill="#7E899C">PLATINUM</text>
      </g>
    </g>
  </g>
</svg>